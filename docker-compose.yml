services:

  # ─── DATABASE ───────────────────────────────────────
  db:
    image: postgres:16                    # Uses official PostgreSQL 16
    container_name: cil_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cil_platform           # Database name
      POSTGRES_USER: cil_admin            # Database username
      POSTGRES_PASSWORD: cil2025          # Database password
    volumes:
      - postgres_data:/var/lib/postgresql/data        # Saves data permanently
      - ./server/models/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql  # Auto-runs schema on first start
    ports:
      - "5432:5432"                       # Exposes DB on port 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cil_admin -d cil_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── BACKEND ────────────────────────────────────────
  server:
    build:
      context: ./server                   # Builds from server folder
      dockerfile: Dockerfile
    container_name: cil_server
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgres://cil_admin:cil2025@db:5432/cil_platform
      JWT_SECRET: cil_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 8h
      EMAIL_FROM: ${EMAIL_FROM}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
    ports:
      - "5000:5000"                       # Backend runs on port 5000
    volumes:
      - ./server:/app                     # Live code reload
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy        # Waits for DB to be ready
    command: npm run dev

  # ─── FRONTEND ───────────────────────────────────────
  client:
    build:
      context: ./client                   # Builds from client folder
      dockerfile: Dockerfile
    container_name: cil_client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000  # Points to backend
    ports:
      - "3000:3000"                       # Frontend runs on port 3000
    volumes:
      - ./client:/app                     # Live code reload
      - /app/node_modules
    depends_on:
      - server

# ─── VOLUMES ──────────────────────────────────────────
volumes:
  postgres_data:                          # Stores database data permanently