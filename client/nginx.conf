# ── www → apex redirect (HTTP) ───────────────────────────────────
server {
    listen 80;
    server_name www.cilyouth.org;
    return 301 https://cilyouth.org$request_uri;
}

# ── HTTP: ACME challenge + redirect to HTTPS ─────────────────────
server {
    listen 80;
    server_name cilyouth.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://cilyouth.org$request_uri;
    }
}

# ── www → apex redirect (HTTPS) ──────────────────────────────────
server {
    listen 443 ssl;
    server_name www.cilyouth.org;

    ssl_certificate     /etc/letsencrypt/live/cilyouth.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cilyouth.org/privkey.pem;

    # Modern SSL settings (inline — no external file dependency)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    return 301 https://cilyouth.org$request_uri;
}

# ── HTTPS: main app ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name cilyouth.org;

    ssl_certificate     /etc/letsencrypt/live/cilyouth.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cilyouth.org/privkey.pem;

    # Modern SSL settings (inline — no external file dependency)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    add_header                Strict-Transport-Security "max-age=63072000" always;

    # ── Gzip compression ─────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/xml text/javascript
                      application/javascript application/x-javascript
                      application/json application/xml application/rss+xml
                      image/svg+xml font/ttf font/otf font/woff font/woff2;

    # ── Static frontend ──────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Health check ─────────────────────────────────────────────
    location /health {
        proxy_pass http://server:5000/health;
    }
}
