# ── www → apex redirect (HTTP) ───────────────────────────────────
server {
    listen 80;
    server_name www.cilyouth.org;
    return 301 https://cilyouth.org$request_uri;
}

# ── HTTP: ACME challenge + redirect to HTTPS ─────────────────────
server {
    listen 80;
    server_name cilyouth.org;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://cilyouth.org$request_uri;
    }
}

# ── www → apex redirect (HTTPS) ──────────────────────────────────
server {
    listen 443 ssl;
    server_name www.cilyouth.org;

    ssl_certificate     /etc/letsencrypt/live/cilyouth.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cilyouth.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://cilyouth.org$request_uri;
}

# ── HTTPS: main app ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name cilyouth.org;

    ssl_certificate     /etc/letsencrypt/live/cilyouth.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cilyouth.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Static frontend ──────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Health check ─────────────────────────────────────────────
    location /health {
        proxy_pass http://server:5000/health;
    }
}
