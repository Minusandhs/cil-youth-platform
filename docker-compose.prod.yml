services:

  # ─── DATABASE ───────────────────────────────────────
  db:
    image: postgres:16
    container_name: cil_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/models/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    # DB port only accessible via localhost on the server (for SSH tunneling)
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── BACKEND ────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: cil_server
    restart: unless-stopped
    environment:
      NODE_ENV:       production
      PORT:           ${PORT}
      DATABASE_URL:   ${DATABASE_URL}
      JWT_SECRET:     ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CORS_ORIGIN:    ${CORS_ORIGIN}
      EMAIL_FROM:           ${EMAIL_FROM}
      AWS_REGION:           ${AWS_REGION}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    # Port NOT exposed externally — nginx proxies to it internally
    depends_on:
      db:
        condition: service_healthy

  # ─── FRONTEND + NGINX ───────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: cil_client
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Let's Encrypt certs (read-only for nginx)
      - certbot_conf:/etc/letsencrypt:ro
      # Certbot webroot for ACME http-01 challenge
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - server

  # ─── CERTBOT (SSL certificate management) ───────────
  certbot:
    image: certbot/certbot:latest
    container_name: cil_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Runs on-demand (init-letsencrypt.sh) or via cron for renewal.
    # --dry-run flag is safe to test without hitting rate limits.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  certbot_conf:
  certbot_www:
